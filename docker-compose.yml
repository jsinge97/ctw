services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ctw
      POSTGRES_PASSWORD: ctw
      POSTGRES_DB: ctw
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ctw -d ctw"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ctw
      MINIO_ROOT_PASSWORD: ctw-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "until mc alias set local http://minio:9000 ctw ctw-password; do sleep 2; done &&
      mc mb -p local/ctw-documents || true"

  api:
    build: .
    command: pnpm --filter @ctw/api start
    environment:
      DATABASE_URL: postgresql://ctw:ctw@postgres:5432/ctw
      CTW_RUNTIME_MODE: demo
      CTW_DB_MODE: prisma
      CTW_JOBS_MODE: pgboss
      CTW_PROVIDER_MODE: fake
      CTW_STORAGE_MODE: s3
      CTW_ALLOW_DEMO_TOKENS: "false"
      APP_BASE_URL: http://localhost:5173
      BETTER_AUTH_SECRET: local-dev-secret
      RESEND_API_KEY: re_replace_me
      RESEND_FROM_EMAIL: deals@northgate.cre
      TWILIO_ACCOUNT_SID: AC_replace_me
      TWILIO_AUTH_TOKEN: replace-me
      TWILIO_FROM_NUMBER: "+14155550188"
      API_PORT: 3000
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: ctw-documents
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build: .
    command: pnpm --filter @ctw/worker start
    environment:
      DATABASE_URL: postgresql://ctw:ctw@postgres:5432/ctw
      CTW_RUNTIME_MODE: demo
      CTW_DB_MODE: prisma
      CTW_JOBS_MODE: pgboss
      CTW_PROVIDER_MODE: fake
      CTW_STORAGE_MODE: s3
      CTW_ALLOW_DEMO_TOKENS: "false"
      APP_BASE_URL: http://localhost:5173
      BETTER_AUTH_SECRET: local-dev-secret
      RESEND_API_KEY: re_replace_me
      RESEND_FROM_EMAIL: deals@northgate.cre
      TWILIO_ACCOUNT_SID: AC_replace_me
      TWILIO_AUTH_TOKEN: replace-me
      TWILIO_FROM_NUMBER: "+14155550188"
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: ctw-documents
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "pnpm", "--filter", "@ctw/worker", "health"]
      interval: 30s
      timeout: 10s
      retries: 5

  web:
    build: .
    command: pnpm --filter @ctw/web dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
  minio-data:
