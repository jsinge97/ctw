services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ctw
      POSTGRES_PASSWORD: ctw
      POSTGRES_DB: ctw
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ctw
      MINIO_ROOT_PASSWORD: ctw-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  api:
    build: .
    command: pnpm --filter @ctw/api dev
    environment:
      DATABASE_URL: postgresql://ctw:ctw@postgres:5432/ctw
      CTW_RUNTIME_MODE: demo
      CTW_DB_MODE: memory
      CTW_JOBS_MODE: memory
      CTW_PROVIDER_MODE: fake
      CTW_ALLOW_DEMO_TOKENS: "true"
      API_PORT: 3000
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: ctw-documents
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - minio

  worker:
    build: .
    command: pnpm --filter @ctw/worker dev
    environment:
      DATABASE_URL: postgresql://ctw:ctw@postgres:5432/ctw
      CTW_RUNTIME_MODE: demo
      CTW_DB_MODE: memory
      CTW_JOBS_MODE: memory
      CTW_PROVIDER_MODE: fake
      CTW_ALLOW_DEMO_TOKENS: "true"
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: ctw-documents
    depends_on:
      - postgres
      - minio

  web:
    build: .
    command: pnpm --filter @ctw/web dev
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres-data:
  minio-data:
