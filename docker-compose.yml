services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ctw
      POSTGRES_PASSWORD: ctw
      POSTGRES_DB: ctw
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build: .
    command: pnpm --filter @ctw/api dev
    environment:
      DATABASE_URL: postgresql://ctw:ctw@postgres:5432/ctw
      CTW_DB_MODE: prisma
      CTW_JOBS_MODE: pgboss
      API_PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  worker:
    build: .
    command: pnpm --filter @ctw/worker dev
    environment:
      DATABASE_URL: postgresql://ctw:ctw@postgres:5432/ctw
      CTW_DB_MODE: prisma
      CTW_JOBS_MODE: pgboss
    depends_on:
      - postgres

  web:
    build: .
    command: pnpm --filter @ctw/web dev
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres-data:
